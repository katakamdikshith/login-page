<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login </title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body{
        margin: 0;
        min-height: 100vh;
        width: 100%;
      }
      .screenSize {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #388b69;
      }
      .background {
        position: relative;
      }
      .background img {
        max-width: 350px;
      }
      .loginpage {
        width: 185px;
        height: 360px;
        position: absolute;
        bottom: 10px;
        right: 5px;
        background-color: rgb(161, 206, 195);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
      }
      .top {
        width: 100%;
        height: 35%;
        border-color: rgb(161, 206, 195);
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 0 10px;
        border-radius: 10px;
      }
      .top img {
        width: 70px;
        border-radius: 5px;
        margin-top: 3px;
      }
      .bottom {
        width: 100%;
        height: 65%;
        background-color: rgb(231, 246, 239);
        border-radius: 20px 20px 10px 10px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      form h3 {
        color: #0d4f4e;
      }
      form input {
        width: 160px;
        padding: 7px;
        border-radius: 3px;
        border: none;
        outline: none;
        font-size:10px;
        box-shadow: 0 5px 5px rgb(178, 177, 177);
        transition: all ease 0.5s;
      }
      form input:hover {
        transform: translateY(-2px);
      }
      form button {
        width: 160px;
        padding: 7px;
        border-radius: 3px;
        border: none;
        outline: none;
        font-size: 8px;
        cursor: pointer;
        color: white;
        background-color: #0d4f4e;
        box-shadow: 0 5px 5px rgb(178, 177, 177);
        transition: all ease 0.5s;
        font-weight: 500;
      }
      form button:hover {
        transform: translateY(-2px);
      }
      form button:active {
        transform: scaleX(0.9);
      }
    </style>
  </head>
  <body>
    <div class="screenSize">
      <div class="background">
        <img src="photo.png" alt="photo" />
        <div class="loginpage">
          <div class="top">
            <img src="logo.png" alt="logo image" />
            <h1><em>Hello!</em></h1>
            <h5><em>Welcome Student</em></h5>
          </div>
          <div class="bottom">
            <form onsubmit="showMessage(event)">
              <h3>Login</h3>

              <input type="email" placeholder="Email" required />
              <input type="password" placeholder="Password" required />

              <button type="submit">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script>
      function showMessage(event) {
        event.preventDefault();
        alert("Login Successful");
      }
    </script>
  </body>
</html>
